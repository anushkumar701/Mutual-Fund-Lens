[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security & SEO Headers (all routes) ──────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # COEP requires all sub-resources to set CORP or COEP.
    # Disabled here because Google Fonts / mfapi.in don't set CORP.
    # Enable once all third-party resources are COEP-compatible.
    # Cross-Origin-Embedder-Policy = "require-corp"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # ── Content Security Policy ──────────────────────────────────
    # script-src: 'self' only + SHA-256 hash of the inline theme-flash script.
    #   Hash covers the minified single-line script in index.html exactly.
    #   If you change the script content, regenerate with:
    #     python3 -c "import hashlib,base64; print('sha256-'+base64.b64encode(hashlib.sha256(open('public/theme-flash.js','rb').read()).digest()).decode())"
    #
    # connect-src: Sentry ingest uses ingest.sentry.io (no wildcard — browsers
    #   reject wildcard subdomains with subdomain patterns like o*.ingest.sentry.io).
    #   Using the canonical ingest.sentry.io covers all org slugs.
    #
    # style-src: 'unsafe-inline' is required for Tailwind CSS utility classes
    #   injected at runtime and for Recharts inline styles. A nonce-based approach
    #   would require SSR; acceptable tradeoff for a pure SPA.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'sha256-a62t875KwsFSmJPIGp8u6eruQQF2loT6MCUFSAkIPYM='; connect-src 'self' https://api.mfapi.in https://sentry.io https://ingest.sentry.io https://*.ingest.sentry.io; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"

# ─── Long-Term Caching for Hashed Static Assets ───────────────
# Vite outputs content-hashed filenames (e.g. main-a1b2c3d4.js),
# so it is safe to cache them for 1 year. Browser auto-busts on new deploy.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache PWA icons & fonts forever (immutable) ──────────────
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ─── Short cache for HTML (SPA entry) & manifest ──────────────
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
