name = "mf-lens"
compatibility_date = "2024-05-30"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

# Cache hashed assets for 1 year — safe because Vite content-hashes filenames.
# HTML is never cached so new deployments are picked up immediately.
[[assets.headers]]
path = "/assets/*"
[assets.headers.headers]
Cache-Control = "public, max-age=31536000, immutable"

[[assets.headers]]
path = "/*.html"
[assets.headers.headers]
Cache-Control = "no-cache, no-store, must-revalidate"

[[assets.headers]]
path = "/manifest.json"
[assets.headers.headers]
Cache-Control = "public, max-age=86400"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
