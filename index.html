<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>FundLens — Mutual Fund Analysis Platform</title>
    <meta name="description" content="FundLens — India's beginner-friendly mutual fund analysis and screening platform. Compare funds, calculate SIP returns, and invest smarter." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://fundlens.netlify.app/" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fundlens.netlify.app/" />
    <meta property="og:title" content="FundLens — Mutual Fund Analysis Platform" />
    <meta property="og:description" content="India's beginner-friendly mutual fund analysis and screening platform. Compare funds, calculate SIP returns, and invest smarter." />
    <meta property="og:site_name" content="FundLens" />
    <meta property="og:image" content="https://fundlens.netlify.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="FundLens — India's mutual fund research platform" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FundLens — Mutual Fund Analysis Platform" />
    <meta name="twitter:description" content="India's beginner-friendly mutual fund analysis and screening platform. Compare funds, calculate SIP returns, and invest smarter." />
    <meta name="twitter:image" content="https://fundlens.netlify.app/og-image.png" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect to external origins (reduces DNS + TLS handshake time) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.mfapi.in" />
    <link rel="dns-prefetch" href="https://api.mfapi.in" />

    <!-- Non-blocking font load: preload → switch to stylesheet on load -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    </noscript>

    <!-- Theme flash prevention: loaded as external script (CSP 'self' safe) -->
    <script src="/theme-flash.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
