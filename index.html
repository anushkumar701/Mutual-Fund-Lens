<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>FundLens — Mutual Fund Analysis Platform</title>
    <meta name="description" content="FundLens — India's beginner-friendly mutual fund analysis and screening platform. Compare funds, calculate SIP returns, and invest smarter." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://fundlens.netlify.app/" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fundlens.netlify.app/" />
    <meta property="og:title" content="FundLens — Mutual Fund Analysis Platform" />
    <meta property="og:description" content="India's beginner-friendly mutual fund analysis and screening platform. Compare funds, calculate SIP returns, and invest smarter." />
    <meta property="og:site_name" content="FundLens" />
    <meta property="og:image" content="https://fundlens.netlify.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="FundLens — India's mutual fund research platform" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FundLens — Mutual Fund Analysis Platform" />
    <meta name="twitter:description" content="India's beginner-friendly mutual fund analysis and screening platform. Compare funds, calculate SIP returns, and invest smarter." />
    <meta name="twitter:image" content="https://fundlens.netlify.app/og-image.png" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect to external origins (reduces DNS + TLS handshake time) -->
    <link rel="preconnect" href="https://api.mfapi.in" />
    <link rel="dns-prefetch" href="https://api.mfapi.in" />

    <!--
      Theme flash prevention — inlined so it runs synchronously before any paint.
      The SHA-256 hash of this exact script is whitelisted in the CSP
      (Content-Security-Policy header in netlify.toml) so no 'unsafe-inline' needed.
      DO NOT modify whitespace inside this script without regenerating the hash.
    -->
    <script>
(function(){var t=localStorage.getItem('fundlens_theme');var d=t==='dark'||t==='bloomberg'||t==='midnight';if(d||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark');}if(t==='bloomberg'||t==='midnight'){document.documentElement.setAttribute('data-theme',t);}})();
    </script>

    <!--
      Critical CSS: prevent layout shift on LCP heading by pre-declaring font stack.
      Ensures the heading renders in correct font metrics before Inter loads.
    -->
    <style>
      html { font-family: 'Inter', system-ui, -apple-system, sans-serif; scrollbar-gutter: stable; }
      body { margin: 0; background: #f0f4f8; }
      .dark body { background: #0d1117; }
      #root { min-height: 100vh; }
    </style>

    <!-- JSON-LD Structured Data for SEO rich results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FundLens",
      "url": "https://fundlens.netlify.app",
      "description": "India's beginner-friendly mutual fund analysis and screening platform. Compare funds, calculate SIP returns, and invest smarter.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "author": {
        "@type": "Organization",
        "name": "FundLens"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
