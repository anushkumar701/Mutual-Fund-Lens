<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>FundLens — Mutual Fund Analysis Platform</title>
    <meta name="description" content="FundLens — India's beginner-friendly mutual fund analysis and screening platform. Compare funds, calculate SIP returns, and invest smarter." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://fundlens.netlify.app/" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fundlens.netlify.app/" />
    <meta property="og:title" content="FundLens — Mutual Fund Analysis Platform" />
    <meta property="og:description" content="India's beginner-friendly mutual fund analysis and screening platform. Compare funds, calculate SIP returns, and invest smarter." />
    <meta property="og:site_name" content="FundLens" />
    <meta property="og:image" content="https://fundlens.netlify.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="FundLens — India's mutual fund research platform" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FundLens — Mutual Fund Analysis Platform" />
    <meta name="twitter:description" content="India's beginner-friendly mutual fund analysis and screening platform. Compare funds, calculate SIP returns, and invest smarter." />
    <meta name="twitter:image" content="https://fundlens.netlify.app/og-image.png" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect to external origins (reduces DNS + TLS handshake time) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.mfapi.in" />
    <link rel="dns-prefetch" href="https://api.mfapi.in" />

    <!--
      Font: loaded non-blocking via media-swap pattern.
      The stylesheet loads as print (non-blocking), then swaps to all media on load.
      Inter is declared in CSS with font-display:swap so the browser renders text
      immediately in the fallback font and swaps when Inter loads — zero layout shift
      because we size-adjust the fallback to match Inter's metrics.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    </noscript>

    <!--
      Theme flash prevention — inlined so it runs synchronously before any paint.
      The SHA-256 hash of this exact script is whitelisted in the CSP
      (Content-Security-Policy header in netlify.toml) so no 'unsafe-inline' needed.
      DO NOT modify whitespace inside this script without regenerating the hash.
    -->
    <script>
(function(){var t=localStorage.getItem('fundlens_theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark');}})();
</script>

    <!--
      Critical CSS: prevent layout shift on LCP heading by pre-declaring font stack.
      Ensures the heading renders in correct font metrics before Inter loads.
    -->
    <style>
      html { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      body { margin: 0; background: #f0f4f8; }
      .dark body { background: #0d1117; }
      #root { min-height: 100vh; }
    </style>

    <!-- Structured Data: WebApplication schema for SEO rich results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FundLens",
      "url": "https://fundlens.netlify.app/",
      "description": "India's beginner-friendly mutual fund analysis and screening platform. Compare funds, calculate SIP returns, and invest smarter.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "author": {
        "@type": "Organization",
        "name": "FundLens"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding:2rem;text-align:center;font-family:system-ui,sans-serif">
        <h1>FundLens — Mutual Fund Analysis Platform</h1>
        <p>JavaScript is required to use FundLens. Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
